version: '3.8'

services:
  untis-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxima_lectio
    restart: always
    networks:
      - proxima-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      VERBOSE: ${VERBOSE:-1}
      NO_COMMAND_UPDATE: ${NO_COMMAND_UPDATE:-0}
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      TZ: Europe/Berlin
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-default-32-byte-encryption!}
      HEALTH_PORT: ${HEALTH_PORT:-8080}
      DB_CONNECTION_STRING: postgres://${DB_USER:-untisuser}:${DB_PASSWORD:-untispass}@db:5432/${DB_NAME:-untisdb}?sslmode=disable
    volumes:
      - bot_data:/root/database
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: postgres:16-alpine
    container_name: proxima_lectio_db
    restart: always
    networks:
      - proxima-network
    environment:
      POSTGRES_USER: ${DB_USER:-untisuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-untispass}
      POSTGRES_DB: ${DB_NAME:-untisdb}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-untisuser} -d ${DB_NAME:-untisdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: proxima_lectio_metabase
    restart: always
    networks:
      - proxima-network
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${DB_NAME:-untisdb}
      MB_DB_PORT: 5432
      MB_DB_USER: ${DB_USER:-untisuser}
      MB_DB_PASS: ${DB_PASSWORD:-untispass}
      MB_DB_HOST: db
      MB_ENCRYPTION_SECRET_KEY: ${METABASE_SECRET_KEY:-your-32-char-encryption-key-for-metabase}
    depends_on:
      - db
    volumes:
      - metabase_data:/metabase-data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  proxima-network:
    driver: bridge

volumes:
  bot_data:
  pg_data:
  metabase_data:
